name: easyrunner
services:
  next-helloworld-app: # this name will be used as part of the service name and dns name
    # fully qualified registry name when the container is built and published remotely (aka deploy flow B)
    image: localhost/next-helloworld-app:latest # registry "localhost" when the container is built locally on the server (aka deploy flow A)
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - easyrunner_proxy_network
    labels:
      # Canonical xyz.easyrunner.service.* schema (issues #159/#222).
      xyz.easyrunner.service.type: web # public — Caddy routes it from the internet (was appIsPublic: true)
      xyz.easyrunner.service.framework: "nextjs" # optimises the Caddy config (was appFramework)
      xyz.easyrunner.service.port: 3000 # port the app process listens on inside the container (was appContainerInternalPort)
      xyz.easyrunner.service.domain: hellonextjs.easyrunner.xyz # required since #222: public domain this web service is routed at

networks:
  easyrunner_proxy_network:
    name: easyrunner_proxy_network
    external: true
    driver: bridge